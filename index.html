<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блинк Хоррор</title>
    <style>
        body { background-color: #0d0000; color: #ff3333; font-family: sans-serif; text-align: center; padding: 20px; }
        .hp-bar { width: 80%; background: #220000; border: 2px solid #ff0000; height: 25px; margin: 20px auto; border-radius: 5px; overflow: hidden; }
        .hp-fill { width: 100%; background: #cc0000; height: 100%; transition: width 0.3s; }
        button { background: #ff0000; color: black; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; box-shadow: 0 0 15px #ff0000; }
        button:active { background: #990000; }
    </style>
</head>
<body>
    <h1>👹 МОНСТР ПЕРЕД ВАМИ</h1>
    <p>Здоровье Монстра:</p>
    <div class="hp-bar"><div id="monster-hp" class="hp-fill"></div></div>
    
    <button onclick="attackMonster()">⚔️ УДАР ШТЫРЕМ</button>

    <script>
        let hp = 100;
        function attackMonster() {
            if(hp > 0) {
                hp -= 20;
                document.getElementById('monster-hp').style.width = hp + '%';
                if(hp <= 0) {
                    alert('🩸 Монстр повержен! Вы временно в безопасности...');
                }
            }
        }
    </script>
</body>
</html>
